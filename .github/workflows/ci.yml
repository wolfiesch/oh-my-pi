name: CI

on:
   push:
      branches: [main, t4code/main]
      # Vouch bookkeeping commits (mitchellh/vouch writes VOUCHED.td back to
      # main on !vouch/!denounce/!unvouch) only edit the vouch list and need no
      # build. Skip CI when a main push changes nothing but the vouch file; a
      # push that also touches anything else still runs the full matrix.
      paths-ignore:
         - .github/VOUCHED.td
   pull_request:
      branches: [main, t4code/main]
   workflow_dispatch:
      inputs:
         skip_npm:
            description: "Skip npm publish"
            type: boolean
            default: false

# Release runs publish a tag atomically with their owning branch HEAD. Sharing
# the cheap branch-wide group meant a later push could cancel an in-flight
# release and leave the tag unpublished (#2564). Upstream release commits,
# every t4code/main push (whose integration-tag status is known only after
# checkout), tag-ref dispatches, and all manual dispatches therefore receive a
# per-sha group with no cancellation. Other main/PR churn keeps cancellation.
concurrency:
   group: "${{ github.workflow }}-${{ (startsWith(github.event.head_commit.message, 'chore: bump version to ') || github.ref == 'refs/heads/t4code/main' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/t4code-') || github.event_name == 'workflow_dispatch') && format('release-{0}', github.sha) || github.ref }}"
   cancel-in-progress: "${{ !(startsWith(github.event.head_commit.message, 'chore: bump version to ') || github.ref == 'refs/heads/t4code/main' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/t4code-') || github.event_name == 'workflow_dispatch') }}"

env:
   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
   # glibc floor for shipped linux native addons. The omp-kata runner image is
   # Ubuntu 24.04 (glibc 2.39); a plain native build links 2.39 symbol versions
   # and fails to dlopen on older distros. Building the linux-gnu addons through
   # cargo-zigbuild against this floor keeps them portable. Bump to raise the
   # minimum supported glibc.
   GLIBC_FLOOR: "2.17"

permissions:
   contents: read
   actions: read

jobs:
   # scripts/release.ts pushes the version-bump commit and its `v*` tag
   # atomically (`git push --atomic origin refs/heads/main:refs/heads/main
   # <sha>:refs/tags/v<version>`), so a release now arrives as a single `push` to
   # `refs/heads/main` — we no longer trigger on the tag ref at all (see
   # `on.push`). This one branch-push run is therefore authoritative: it runs the
   # full build AND, when HEAD carries a release tag, the release/publish jobs.
   # The T4 product lane follows the same branch-push contract with
   # `t4code-X.Y.Z-appserver-N` on `t4code/main`. `release_metadata` resolves
   # either tag once, rejects cross-branch tag identities, and exposes the tag,
   # kind, and plain semver to downstream jobs. A tag-ref workflow_dispatch is
   # also supported for an explicit retry.
   release_metadata:
      name: Resolve release metadata
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      outputs:
         is-release: ${{ steps.detect.outputs.is-release }}
         release-tag: ${{ steps.detect.outputs.release-tag }}
         release-kind: ${{ steps.detect.outputs.release-kind }}
         release-version: ${{ steps.detect.outputs.release-version }}
      steps:
         - uses: actions/checkout@v4
           with:
              # Full history supplies atomic branch-push tags and lets a
              # tag-ref dispatch prove membership in its owning remote branch.
              fetch-depth: 0
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
         - name: Detect release tag at HEAD
           id: detect
           run: bun scripts/ci-release-metadata.ts

   # Compute a stable hash of every input that affects the native cdylib output,
   # then look for a prior successful run on the branch that owns this workflow
   # invocation (`main` or `t4code/main`) that already uploaded the native
   # artifacts for this hash. Pull requests use their base branch. Two
   # independent outputs:
   #   * `linux-x64-run-id` — set when the linux x64 canary
   #     (`pi-natives-linux-x64-modern-h<hash>`) is present on a prior main run,
   #     so native-dependent TS test jobs and `native_linux_x64` can reuse it.
   #   * `cross-platform-run-id` — set when ALL cross-platform native artifacts
   #     also have non-expired artifacts on that same prior run, so
   #     `native_cross_platform` can skip the cold rebuild on main pushes after
   #     dep changes have already warmed sccache there.
   # Native jobs, including releases, are skipped when their canary hits. The
   # source hash makes reuse content-addressed rather than version- or
   # branch-addressed; the owning branch only limits provenance to trusted,
   # successful push runs. The canary retention window (see build-native action)
   # is the effective TTL.
   native_artifact_lookup:
      name: Look up cached native artifacts
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      outputs:
         source-hash: ${{ steps.compute.outputs.source-hash }}
         linux-x64-run-id: ${{ steps.find.outputs.linux-x64-run-id }}
         cross-platform-run-id: ${{ steps.find.outputs.cross-platform-run-id }}
      steps:
         - uses: actions/checkout@v4
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
         - name: Compute native source hash
           id: compute
           shell: bash
           run: |
              source_hash=$(bun scripts/ci-native-source-hash.ts)
              echo "source-hash=$source_hash" >> "$GITHUB_OUTPUT"
              echo "Native source hash: $source_hash"
         - name: Find trusted build with matching native artifacts
           id: find
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              PR_BASE_REF: ${{ github.base_ref }}
              REPOSITORY: ${{ github.repository }}
           shell: bash
           run: |
              hash="${{ steps.compute.outputs.source-hash }}"
              cache_branch="main"
              case "$GITHUB_REF" in
                refs/heads/t4code/main|refs/tags/t4code-*)
                  cache_branch="t4code/main"
                  ;;
                refs/pull/*)
                  cache_branch="$PR_BASE_REF"
                  ;;
              esac
              if [ -z "$cache_branch" ]; then
                echo "Unable to resolve a trusted native artifact branch for $GITHUB_REF" >&2
                exit 1
              fi
              echo "Searching successful $cache_branch push runs for native source hash $hash"
              linux_canary="pi-natives-linux-x64-modern-h${hash}"
              linux_required=(
                "pi-natives-linux-x64-baseline-h${hash}"
                "$linux_canary"
              )
              cross_platform_required=(
                "pi-natives-linux-arm64-h${hash}"
                "pi-natives-darwin-x64-baseline-h${hash}"
                "pi-natives-darwin-arm64-h${hash}"
                "pi-natives-win32-x64-baseline-h${hash}"
              )
              linux_x64_run_id=""
              cross_platform_run_id=""
              # Query by the exact content-addressed canary instead of searching
              # only the latest N runs. This honors the full artifact retention
              # window without making one API request for every intervening push.
              candidates=$(gh api --paginate \
                "/repos/$REPOSITORY/actions/artifacts?name=$linux_canary&per_page=100" \
                --jq '.artifacts[] | select(.expired == false) | .workflow_run.id' \
                | awk '!seen[$0]++')
              for candidate in $candidates; do
                metadata=$(gh api "/repos/$REPOSITORY/actions/runs/$candidate" \
                  --jq '[.conclusion, .event, .head_branch, .path] | @tsv')
                IFS=$'\t' read -r conclusion event head_branch workflow_path <<< "$metadata"
                if [ "$conclusion" != "success" ] || [ "$event" != "push" ] || \
                   [ "$head_branch" != "$cache_branch" ] || [ "$workflow_path" != ".github/workflows/ci.yml" ]; then
                  continue
                fi
                names=$(gh api "/repos/$REPOSITORY/actions/runs/$candidate/artifacts?per_page=100" \
                    --jq '.artifacts[] | select(.expired == false) | .name')
                if [ -z "$linux_x64_run_id" ]; then
                  all_linux_found=true
                  for req in "${linux_required[@]}"; do
                    if ! echo "$names" | grep -qFx "$req"; then
                      all_linux_found=false
                      break
                    fi
                  done
                  if $all_linux_found; then
                    linux_x64_run_id="$candidate"
                  fi
                fi
                if [ -z "$cross_platform_run_id" ]; then
                  all_found=true
                  for req in "${linux_required[@]}" "${cross_platform_required[@]}"; do
                    if ! echo "$names" | grep -qFx "$req"; then
                      all_found=false
                      break
                    fi
                  done
                  if $all_found; then
                    cross_platform_run_id="$candidate"
                  fi
                fi
                if [ -n "$linux_x64_run_id" ] && [ -n "$cross_platform_run_id" ]; then
                  break
                fi
              done
              if [ -n "$linux_x64_run_id" ]; then
                echo "Reusing Linux x64 native artifacts from run $linux_x64_run_id"
              else
                echo "No cached Linux x64 native artifacts for hash $hash; native_linux_x64 will rebuild."
              fi
              if [ -n "$cross_platform_run_id" ]; then
                echo "Reusing cross-platform native artifacts from run $cross_platform_run_id"
              else
                echo "No cached cross-platform native artifacts for hash $hash; native_cross_platform will rebuild on main."
              fi
              {
                echo "linux-x64-run-id=$linux_x64_run_id"
                echo "cross-platform-run-id=$cross_platform_run_id"
              } >> "$GITHUB_OUTPUT"

   # Fast lint, type check, and browser bundle build (no Rust, no native build needed)
   check:
      name: Lint, type check & web build
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/bun-install
         - name: Type check workspace
           run: bun run ci:check:full
         - name: Build collab web
           run: bun run collab:web:build

   # Rust validation used to run inside both Linux native matrix entries, which
   # serialized check + test + artifact build and made every native-dependent TS
   # job wait. Keep the Linux validation authority, but run check and test once
   # each as parallel matrix legs beside artifact production.
   rust_validation:
      name: "Validate Rust: ${{ matrix.phase }}"
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      strategy:
         fail-fast: false
         matrix:
            phase: [check, test]
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/ensure-rust-toolchain
           with:
              toolchain: nightly-2026-04-29
              components: ${{ matrix.phase == 'check' && 'clippy,rustfmt' || '' }}
         - name: Detect runner environment
           id: detect
           shell: bash
           run: |
              if [ -n "${SCCACHE_BUCKET:-}" ]; then
                echo "on_infra=true" >> "$GITHUB_OUTPUT"
              else
                echo "on_infra=false" >> "$GITHUB_OUTPUT"
              fi
         - name: Cache Rust target (GitHub-hosted)
           if: steps.detect.outputs.on_infra == 'false'
           uses: Swatinem/rust-cache@v2
           with:
              shared-key: rust-validation-${{ matrix.phase }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml') }}
              cache-on-failure: true
              save-if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/t4code/main') }}
              cache-workspace-crates: true
         - name: Ensure baked sccache (omp-kata)
           if: steps.detect.outputs.on_infra == 'true'
           uses: ./.github/actions/ensure-sccache
           with:
              version: "0.15.0"
         - name: Setup sccache (GitHub-hosted)
           if: steps.detect.outputs.on_infra == 'false'
           uses: mozilla-actions/sccache-action@v0.0.10
         - name: Enable sccache for cargo
           shell: bash
           run: |
              {
                echo "RUSTC_WRAPPER=sccache"
                echo "CARGO_INCREMENTAL=0"
              } >> "$GITHUB_ENV"
              if [ -n "${SCCACHE_BUCKET:-}" ]; then
                echo "sccache backend: shared S3 ($SCCACHE_BUCKET @ $SCCACHE_ENDPOINT)"
              else
                echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
                echo "sccache backend: GitHub Actions cache"
              fi
         - name: Ensure baked cargo-nextest (omp-kata)
           if: steps.detect.outputs.on_infra == 'true' && matrix.phase == 'test'
           uses: ./.github/actions/ensure-cargo-tool
           with:
              binary: cargo-nextest
              crate: cargo-nextest
         - name: Install cargo-nextest (GitHub-hosted)
           if: steps.detect.outputs.on_infra == 'false' && matrix.phase == 'test'
           uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
           with:
              tool: nextest
         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Validate Rust workspace
           run: bun run ${{ matrix.phase == 'check' && 'check:rs' || 'test:rs' }}

   # Linux x64 baseline + modern: required by `test`, so it runs only when the
   # content-addressed lookup did not find a complete trusted artifact pair.
   # Releases reuse the same immutable bits when their native source hash is
   # unchanged; a native-affecting change necessarily produces a new hash.
   native_linux_x64:
      name: "Native: Linux x64 (${{ matrix.variant }})"
      needs: [release_metadata, native_artifact_lookup]
      if: ${{ needs.native_artifact_lookup.outputs.linux-x64-run-id == '' }}
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      strategy:
         fail-fast: false
         matrix:
            include:
               - { variant: baseline }
               - { variant: modern }
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/build-native
           with:
              hash: ${{ needs.native_artifact_lookup.outputs.source-hash }}
              platform: linux
              arch: x64
              variant: ${{ matrix.variant }}
              glibc: ${{ env.GLIBC_FLOOR }}
              rust_checks: "false"
              rust_tests: "false"
              save_cache: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/t4code/main') }}

   # Pre-warm the cross-platform native build cache on each owning branch, in
   # addition to building the artifacts that ship in releases. This lets a
   # reviewed t4code/main merge establish the trusted push artifacts before its
   # tag-ref publication retry. Skipped when native_artifact_lookup already
   # found a recent run with all artifacts intact.
   native_cross_platform_kata:
      name: "Native: ${{ matrix.platform }} ${{ matrix.arch }}"
      needs: [release_metadata, native_artifact_lookup]
      if: ${{ (needs.release_metadata.outputs.is-release == 'true' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/t4code/main'))) && needs.native_artifact_lookup.outputs.cross-platform-run-id == '' }}
      strategy:
         fail-fast: false
         matrix:
            include:
               - { os: omp-kata, platform: linux, arch: arm64, target: aarch64-unknown-linux-gnu }
               - { os: omp-kata, platform: win32, arch: x64, target: x86_64-pc-windows-msvc, variant: baseline }
      runs-on: ${{ github.repository != 'can1357/oh-my-pi' && 'ubuntu-22.04' || matrix.os }}
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/build-native
           with:
              hash: ${{ needs.native_artifact_lookup.outputs.source-hash }}
              platform: ${{ matrix.platform }}
              arch: ${{ matrix.arch }}
              variant: ${{ matrix.variant }}
              target: ${{ matrix.target }}
              glibc: ${{ matrix.platform == 'linux' && env.GLIBC_FLOOR || '' }}
              rust_tests: "false"
              save_cache: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/t4code/main') }}

   native_cross_platform_macos:
      name: "Native: ${{ matrix.platform }} ${{ matrix.arch }}"
      needs: [release_metadata, native_artifact_lookup]
      if: ${{ (needs.release_metadata.outputs.is-release == 'true' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/t4code/main'))) && needs.native_artifact_lookup.outputs.cross-platform-run-id == '' }}
      strategy:
         fail-fast: false
         matrix:
            include:
               - { os: macos-15-intel, platform: darwin, arch: x64, target: "", variant: baseline }
               - { os: macos-14, platform: darwin, arch: arm64, target: "" }
      runs-on: ${{ matrix.os }}
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/build-native
           with:
              hash: ${{ needs.native_artifact_lookup.outputs.source-hash }}
              platform: ${{ matrix.platform }}
              arch: ${{ matrix.arch }}
              variant: ${{ matrix.variant }}
              target: ${{ matrix.target }}
              rust_tests: "false"
              save_cache: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/t4code/main') }}
   test_workspace:
      name: Test TS workspace fast
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 20
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: pi-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test workspace packages and repo scripts (TS)
           run: bun run ci:test:ts:workspace

   test_coding_agent_singleton:
      name: Test coding-agent singleton/global-state (TS)
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 20
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: pi-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test coding-agent singleton/global-state bucket
           # Keep global Settings/env/fake-timer tests serial; native addon
           # artifacts are still available like every other coding-agent bucket.
           run: bun run ci:test:coding-agent:singleton

   test_ts_native:
      name: Test TS native/integration packages
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 25
      steps:
         - uses: actions/checkout@v4

         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: pi-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test native/TUI/browser-ish packages (TS)
           run: bun run ci:test:ts:native

   test_coding_agent_ui:
      name: Test coding-agent UI/TUI (TS)
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 25
      steps:
         - uses: actions/checkout@v4

         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: pi-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test coding-agent UI/TUI bucket
           run: bun run ci:test:coding-agent:ui

   test_coding_agent_runtime:
      name: Test coding-agent runtime/session (TS)
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 25
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: pi-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test coding-agent runtime bucket
           # Runtime/session tests import native-backed barrels too; keep this
           # separate for concurrency, not as a native-free guardrail.
           run: bun run ci:test:coding-agent:runtime

   test_coding_agent_native:
      name: Test coding-agent native/unit (TS)
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 25
      steps:
         - uses: actions/checkout@v4

         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: pi-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Test coding-agent native/unit bucket
           run: bun run ci:test:coding-agent:native

   test_smoke:
      name: Test CLI smoke (TS)
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      needs: [native_linux_x64, native_artifact_lookup]
      if: ${{ !cancelled() && needs.native_linux_x64.result != 'failure' }}
      timeout-minutes: 15
      steps:
         - uses: actions/checkout@v4

         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Resolve Linux x64 native artifact run
           id: source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                echo "artifact-run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
              else
                echo "artifact-run-id=${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}" >> "$GITHUB_OUTPUT"
              fi
         - name: Download native addons
           uses: actions/download-artifact@v4
           with:
              pattern: pi-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: CLI smoke test
           run: bun run ci:test:smoke

   install_methods:
      name: Install method smoke tests
      runs-on: ${{ (github.event_name == 'pull_request' || github.repository != 'can1357/oh-my-pi') && 'ubuntu-22.04' || 'omp-kata' }}
      steps:
         - uses: actions/checkout@v4
         - uses: ./.github/actions/ensure-rust-toolchain
           with:
              toolchain: nightly-2026-04-29
         - name: Detect runner environment
           id: detect
           shell: bash
           run: |
              # $SCCACHE_BUCKET is injected only on self-hosted omp-kata pods; its
              # presence selects baked sccache + shared S3. GitHub-hosted runners
              # (PRs) need sccache-action to export the GHA cache URL/token into the
              # step env — a bare binary install leaves SCCACHE_GHA_ENABLED set with
              # no cache URL, so sccache server startup fails ("cache url for ghac
              # not found"). Mirrors the build-native action's sccache wiring.
              if [ -n "${SCCACHE_BUCKET:-}" ]; then
                echo "on_infra=true" >> "$GITHUB_OUTPUT"
              else
                echo "on_infra=false" >> "$GITHUB_OUTPUT"
              fi
         - name: Ensure baked sccache (omp-kata)
           if: steps.detect.outputs.on_infra == 'true'
           uses: ./.github/actions/ensure-sccache
           with:
              version: "0.15.0"
         - name: Setup sccache (GitHub-hosted)
           if: steps.detect.outputs.on_infra == 'false'
           uses: mozilla-actions/sccache-action@v0.0.10
         - name: Enable sccache for cargo
           # Conditional backend: self-hosted omp-kata injects a shared S3
           # (RustFS) sccache via pod env; GitHub-hosted runners keep the GHA
           # cache. CARGO_INCREMENTAL=0 keeps sccache from silently no-oping.
           shell: bash
           run: |
              {
                echo "RUSTC_WRAPPER=sccache"
                echo "CARGO_INCREMENTAL=0"
              } >> "$GITHUB_ENV"
              if [ -n "${SCCACHE_BUCKET:-}" ]; then
                echo "sccache backend: shared S3 ($SCCACHE_BUCKET @ $SCCACHE_ENDPOINT)"
              else
                echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
                echo "sccache backend: GitHub Actions cache"
              fi
         - uses: ./.github/actions/setup-system-deps
         - uses: ./.github/actions/bun-install
         - name: Install method smoke tests
           run: bun run ci:test:install-methods

   release_binary:
      name: "Release binary: ${{ matrix.target_id }}"
      if: ${{ needs.release_metadata.outputs.is-release == 'true' && !cancelled() &&
         (needs.native_linux_x64.result == 'success' || (needs.native_linux_x64.result == 'skipped' && needs.native_artifact_lookup.outputs.linux-x64-run-id != '')) &&
         (needs.native_cross_platform_kata.result == 'success' || (needs.native_cross_platform_kata.result == 'skipped' && needs.native_artifact_lookup.outputs.cross-platform-run-id != '')) &&
         (needs.native_cross_platform_macos.result == 'success' || (needs.native_cross_platform_macos.result == 'skipped' && needs.native_artifact_lookup.outputs.cross-platform-run-id != '')) &&
         needs.test_workspace.result == 'success' &&
         needs.test_coding_agent_singleton.result == 'success' &&
         needs.test_ts_native.result == 'success' &&
         needs.test_coding_agent_ui.result == 'success' &&
         needs.test_coding_agent_runtime.result == 'success' &&
         needs.test_coding_agent_native.result == 'success' &&
         needs.test_smoke.result == 'success' && needs.check.result == 'success' &&
         needs.rust_validation.result == 'success' && needs.install_methods.result == 'success' }}
      needs: [release_metadata, check, rust_validation, native_linux_x64, native_cross_platform_kata, native_cross_platform_macos, test_workspace, test_coding_agent_singleton, test_ts_native, test_coding_agent_ui, test_coding_agent_runtime, test_coding_agent_native, test_smoke, install_methods, native_artifact_lookup]
      strategy:
         fail-fast: false
         matrix:
            include:
               - {
                    os: ubuntu-22.04,
                    platform: linux,
                    arch: x64,
                    target_id: linux-x64,
                    binary_path: packages/coding-agent/binaries/omp-linux-x64,
                 }
               - {
                    os: ubuntu-24.04-arm,
                    platform: linux,
                    arch: arm64,
                    target_id: linux-arm64,
                    binary_path: packages/coding-agent/binaries/omp-linux-arm64,
                 }
               - {
                    os: macos-15-intel,
                    platform: darwin,
                    arch: x64,
                    target_id: darwin-x64,
                    binary_path: packages/coding-agent/binaries/omp-darwin-x64,
                 }
               - {
                    os: macos-14,
                    platform: darwin,
                    arch: arm64,
                    target_id: darwin-arm64,
                    binary_path: packages/coding-agent/binaries/omp-darwin-arm64,
                 }
               - {
                    os: ubuntu-22.04,
                    platform: win32,
                    arch: x64,
                    target_id: win32-x64,
                    binary_path: packages/coding-agent/binaries/omp-windows-x64.exe,
                 }
      runs-on: ${{ matrix.os }}
      permissions:
         contents: read
         actions: read
         id-token: write
      env:
         MACOS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER_ID != '' && secrets.APPLE_API_KEY != '' }}
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
           env:
              SCCACHE_BUCKET: ""
              AWS_ACCESS_KEY_ID: ""
         - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
           if: ${{ github.repository == 'can1357/oh-my-pi' && needs.release_metadata.outputs.release-kind == 'upstream' && !inputs.skip_npm }}
           with:
              node-version: "24"
              registry-url: "https://registry.npmjs.org"
         # npm runs under Bun when invoked by the release script; npm 12
         # requires a newer emulated Node version than Bun 1.3 provides.
         - name: Ensure npm supports trusted publishing
           if: ${{ github.repository == 'can1357/oh-my-pi' && needs.release_metadata.outputs.release-kind == 'upstream' && !inputs.skip_npm }}
           run: npm install -g npm@11.17.0
         - name: Cache bun dependencies
           uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
           with:
              path: ~/.bun/install/cache
              key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', 'patches/**/*.patch') }}
         - run: bun install --frozen-lockfile
         - name: Resolve native artifact run
           id: native-source
           shell: bash
           env:
              PLATFORM: ${{ matrix.platform }}
              ARCH: ${{ matrix.arch }}
              LINUX_JOB_RESULT: ${{ needs.native_linux_x64.result }}
              KATA_JOB_RESULT: ${{ needs.native_cross_platform_kata.result }}
              MACOS_JOB_RESULT: ${{ needs.native_cross_platform_macos.result }}
              CACHED_LINUX_RUN_ID: ${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}
              CACHED_CROSS_RUN_ID: ${{ needs.native_artifact_lookup.outputs.cross-platform-run-id }}
           run: |
              if [ "$PLATFORM:$ARCH" = "linux:x64" ]; then
                job_result="$LINUX_JOB_RESULT"
                cached_run_id="$CACHED_LINUX_RUN_ID"
              elif [ "$PLATFORM" = "darwin" ]; then
                job_result="$MACOS_JOB_RESULT"
                cached_run_id="$CACHED_CROSS_RUN_ID"
              else
                job_result="$KATA_JOB_RESULT"
                cached_run_id="$CACHED_CROSS_RUN_ID"
              fi

              if [ "$job_result" = "success" ]; then
                artifact_run_id="$GITHUB_RUN_ID"
              else
                artifact_run_id="$cached_run_id"
              fi
              if [ -z "$artifact_run_id" ]; then
                echo "No native artifact run is available for $PLATFORM:$ARCH (job result: $job_result)" >&2
                exit 1
              fi
              echo "Using native artifacts from run $artifact_run_id for $PLATFORM:$ARCH"
              echo "artifact-run-id=$artifact_run_id" >> "$GITHUB_OUTPUT"
         - name: Download native addon(s)
           uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
           with:
              pattern: pi-natives-${{ matrix.platform }}-${{ matrix.arch }}*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.native-source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Build release binary
           env:
              RELEASE_TARGETS: ${{ matrix.target_id }}
           run: bun run ci:release:build-binaries
         - name: Sign and notarize macOS binary (Developer ID)
           # Replaces the ad-hoc signature with a Developer ID + hardened-runtime
           # one (+JIT/library-validation entitlements; omp dlopens its
           # runtime-extracted native addon, which has a different Team ID) and
           # notarizes. Auto-skips until the APPLE_* secrets are configured.
           if: matrix.platform == 'darwin' && env.MACOS_SIGNING == 'true'
           env:
              APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
              APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
              APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
              APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
              APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
           run: bash scripts/ci-macos-sign.sh "${{ matrix.binary_path }}"
         # Windows binary is cross-built on Linux, so we have no Windows runner
         # to smoke it on. Cross-build correctness is verified via the napi
         # entry-point exports (see build-native action) and the bun
         # `--compile --target=bun-windows-x64-*` cross-compile.
         - name: Smoke release binary
           if: matrix.platform != 'win32'
           run: |
              runtime_dir="$(mktemp -d)"
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" "${{ matrix.binary_path }}" --version
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" "${{ matrix.binary_path }}" --smoke-test
         - name: Publish native addon package
           if: ${{ github.repository == 'can1357/oh-my-pi' && needs.release_metadata.outputs.release-kind == 'upstream' && !inputs.skip_npm }}
           env:
              # Fallback auth: setup-node wrote an .npmrc referencing
              # NODE_AUTH_TOKEN; npm uses it only when OIDC has no trusted
              # publisher for the package (or on a first publish).
              NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
           run: bun run ci:release:publish-native-leaf ${{ matrix.target_id }}
         - name: Upload release binary artifact
           uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
           with:
              name: omp-binary-${{ matrix.target_id }}
              path: ${{ matrix.binary_path }}

   release_github:
      name: Publish GitHub release
      if: ${{ needs.release_metadata.outputs.is-release == 'true' && !cancelled() &&
         needs.release_binary.result == 'success' }}
      needs: [release_metadata, release_binary]
      runs-on: ubuntu-22.04
      permissions:
         contents: write
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
         - name: Generate release notes from CHANGELOGs
           env:
              # `gh release list` (used to find the latest published GitHub
              # Release tag below the target so silent-tag changelog sections
              # roll forward — #2596) requires GH_TOKEN in Actions. Without
              # it gh exits non-zero and the script would degrade to legacy
              # single-version notes, defeating the recovery.
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           run: |
              args=("${{ needs.release_metadata.outputs.release-version }}")
              if [ "${{ needs.release_metadata.outputs.release-kind }}" = "t4code" ]; then
                args+=(--include-unreleased)
              fi
              bun scripts/ci-release-notes.ts "${args[@]}"
         - name: Download release binaries
           uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
           with:
              pattern: omp-binary-*
              path: packages/coding-agent/binaries
              merge-multiple: true
         - name: Create GitHub Release
           uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
           with:
              tag_name: ${{ needs.release_metadata.outputs.release-tag }}
              files: |
                 packages/coding-agent/binaries/omp-*
              body_path: release-notes.md
              generate_release_notes: true


   release_github_verify:
      name: Verify published release (macOS)
      if: ${{ needs.release_metadata.outputs.is-release == 'true' && !cancelled() &&
         needs.release_github.result == 'success' }}
      needs: [release_metadata, release_github]
      runs-on: macos-14
      permissions:
         contents: read
      env:
         MACOS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER_ID != '' && secrets.APPLE_API_KEY != '' }}
      steps:
         - name: Download published macOS arm64 binary
           run: |
              curl -fsSL -o omp-darwin-arm64 "https://github.com/${{ github.repository }}/releases/download/${{ needs.release_metadata.outputs.release-tag }}/omp-darwin-arm64"
              chmod +x omp-darwin-arm64
         - name: Verify published macOS arm64 binary
           run: |
              codesign -dvvv ./omp-darwin-arm64
              codesign --verify --strict --verbose=4 ./omp-darwin-arm64
              runtime_dir="$(mktemp -d)"
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" ./omp-darwin-arm64 --version
              HOME="$runtime_dir/home" XDG_DATA_HOME="$runtime_dir/xdg" ./omp-darwin-arm64 --smoke-test
         - name: Assert signed release is not ad-hoc
           if: env.MACOS_SIGNING == 'true'
           run: |
              if codesign -dvvv ./omp-darwin-arm64 2>&1 | grep -qE "flags=.*adhoc|Signature=adhoc"; then
                echo "published binary is still ad-hoc signed (Developer ID signing did not run)" >&2
                exit 1
              fi
              # Gatekeeper assessment: a notarized Developer ID binary is accepted.
              # Informational — a bare (unstapled) Mach-O relies on the online ticket
              # lookup, so surface the result without gating the release on it.
              spctl -a -t exec -vv ./omp-darwin-arm64 || echo "spctl non-zero (expected for unstapled bare binary; ticket served online)"

   release_npm:
      name: Publish to npm
      if: ${{ needs.release_metadata.outputs.is-release == 'true' &&
         github.repository == 'can1357/oh-my-pi' &&
         needs.release_metadata.outputs.release-kind == 'upstream' && !cancelled() &&
         needs.release_binary.result == 'success' &&
         needs.release_github_verify.result == 'success' &&
         !inputs.skip_npm }}
      needs: [release_metadata, release_binary, release_github_verify, native_linux_x64, native_artifact_lookup]
      runs-on: ubuntu-22.04
      # `id-token: write` lets npm mint the GitHub OIDC token it exchanges for a
      # short-lived publish token (trusted publishing + provenance). When a
      # package has no matching trusted publisher configured, npm silently falls
      # back to NODE_AUTH_TOKEN below — which also covers first-ever publishes.
      permissions:
         id-token: write
         contents: read
         actions: read
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           with:
              bun-version: "1.3"
         - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
           with:
              node-version: "24"
              registry-url: "https://registry.npmjs.org"
         # npm runs under Bun when invoked by the release script; npm 12
         # requires a newer emulated Node version than Bun 1.3 provides.
         - name: Ensure npm supports trusted publishing
           run: npm install -g npm@11.17.0
         - name: Cache bun dependencies
           uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
           with:
              path: ~/.bun/install/cache
              key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', 'patches/**/*.patch') }}
         - run: bun install --frozen-lockfile
         # The pi-coding-agent prepack executes workspace code (bundle-dist
         # imports the pi-utils barrel, which loads the pi-natives addon), so
         # this job needs the linux x64 native addons just like `test` does.
         # Native artifacts may come from this run or from a hash-identical,
         # successful push on the trusted owning branch. Resolve that source
         # explicitly so cached-native releases preserve the npm prepack path.
         - name: Resolve Linux x64 native artifact run
           id: native-source
           shell: bash
           run: |
              if [ "${{ needs.native_linux_x64.result }}" = "success" ]; then
                artifact_run_id="$GITHUB_RUN_ID"
              else
                artifact_run_id="${{ needs.native_artifact_lookup.outputs.linux-x64-run-id }}"
              fi
              if [ -z "$artifact_run_id" ]; then
                echo "No Linux x64 native artifact run is available for npm publishing" >&2
                exit 1
              fi
              echo "artifact-run-id=$artifact_run_id" >> "$GITHUB_OUTPUT"
         - name: Download native addons
           uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
           with:
              pattern: pi-natives-linux-x64-*-h${{ needs.native_artifact_lookup.outputs.source-hash }}
              path: packages/natives/native
              merge-multiple: true
              run-id: ${{ steps.native-source.outputs.artifact-run-id }}
              github-token: ${{ secrets.GITHUB_TOKEN }}
         - name: Publish to npm
           env:
              # Fallback auth: setup-node wrote an .npmrc referencing
              # NODE_AUTH_TOKEN; npm uses it only when OIDC has no trusted
              # publisher for the package (or on a first publish).
              NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
           run: bun run ci:release:publish

   # Regenerate the Homebrew tap formula (can1357/homebrew-tap) from the freshly
   # published release assets and push it. Gated on release_github_verify so the
   # tap only cuts over to a release whose published binary was verified (matches
   # how release_npm is gated). No-ops when HOMEBREW_TAP_DEPLOY_KEY is unset, so a
   # release never blocks on tap access.
   release_brew:
      name: Update Homebrew tap
      if: ${{ needs.release_metadata.outputs.is-release == 'true' &&
         github.repository == 'can1357/oh-my-pi' &&
         needs.release_metadata.outputs.release-kind == 'upstream' && !cancelled() &&
         needs.release_github_verify.result == 'success' }}
      needs: [release_metadata, release_github_verify]
      runs-on: ubuntu-22.04
      env:
         HAS_TAP_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY != '' }}
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
           if: env.HAS_TAP_KEY == 'true'
         - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
           if: env.HAS_TAP_KEY == 'true'
           with:
              bun-version: "1.3"
         - name: Check out the Homebrew tap
           if: env.HAS_TAP_KEY == 'true'
           uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
           with:
              repository: can1357/homebrew-tap
              ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
              path: homebrew-tap
         - name: Regenerate and push the formula
           if: env.HAS_TAP_KEY == 'true'
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           run: |
              bun scripts/ci-update-brew-formula.ts "${{ needs.release_metadata.outputs.release-tag }}" --out homebrew-tap/Formula/omp.rb
              cd homebrew-tap
              if git diff --quiet -- Formula/omp.rb; then
                echo "formula already up to date for ${{ needs.release_metadata.outputs.release-tag }}"
                exit 0
              fi
              git -c user.name="github-actions[bot]" \
                  -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                  commit -m "omp ${{ needs.release_metadata.outputs.release-tag }}" -- Formula/omp.rb
              git push origin HEAD:main
