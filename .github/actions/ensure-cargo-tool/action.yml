name: "ensure cargo tool"
description: Ensure a cargo-installed CLI is present.

inputs:
   binary:
      required: true
      description: Binary name expected on PATH
   crate:
      required: false
      default: ""
      description: Crate name to cargo install; defaults to the binary name
   version:
      required: false
      default: ""
      description: Optional crate version

runs:
   using: composite
   steps:
      - shell: bash
        env:
           BINARY: ${{ inputs.binary }}
           CRATE: ${{ inputs.crate }}
           VERSION: ${{ inputs.version }}
        run: |
           set -euo pipefail
           tool_version() {
             "$BINARY" --version 2>/dev/null || "$BINARY" "${BINARY#cargo-}" --version
           }
           force_install=false
           if command -v "$BINARY" >/dev/null 2>&1; then
             if [ -z "$VERSION" ]; then
               echo "Using baked cargo tool: $BINARY"
               exit 0
             fi
             escaped_version=${VERSION//./\\.}
             actual_version=$(tool_version 2>/dev/null || true)
             if echo "$actual_version" | grep -Eq "(^|[[:space:]])v?${escaped_version}([[:space:]]|$)"; then
               echo "Using baked cargo tool: $BINARY $VERSION"
               exit 0
             fi
             echo "Baked $BINARY does not match required version $VERSION; reinstalling"
             force_install=true
           fi

           crate="${CRATE:-$BINARY}"
           install_args=(install --locked "$crate")
           if [ -n "$VERSION" ]; then
             install_args+=(--version "$VERSION")
           fi
           if $force_install; then
             install_args+=(--force)
           fi
           cargo "${install_args[@]}"
           cargo_bin_dir="${CARGO_HOME:-$HOME/.cargo}/bin"
           export PATH="$cargo_bin_dir:$PATH"
           echo "$cargo_bin_dir" >> "$GITHUB_PATH"
           tool_version
